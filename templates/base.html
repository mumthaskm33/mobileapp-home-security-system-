<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intruder Alert System</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="brand">
            <i class="fas fa-shield-alt"></i> SECURE.AI
        </div>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="/intruders" class="nav-link {% if request.path == '/intruders' %}active{% endif %}">
            <i class="fas fa-user-secret"></i> Intruders
        </a>
        <a href="/authorized" class="nav-link {% if request.path == '/authorized' %}active{% endif %}">
            <i class="fas fa-users-cog"></i> Users
        </a>
        <div style="margin-top: auto; color: var(--text-secondary); font-size: 0.8rem;">
            System v1.0<br>
            Status: <span class="status-active">● Online</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
